baseURL = "http://localhost:1313"
languageCode = "pt-br"
title = "DocHub"
theme = "dochub"
enableRobotsTXT = true
enableGitInfo = true

# Default language for the site
defaultContentLanguage = "pt-br"
defaultContentLanguageInSubdir = false

[params]
  org         = "Sua Empresa"
  description = "Documentação centralizada de todos os times de Sua Empresa"
  version     = "1.0.0"
  github      = "https://github.com/your-org/docs-hub"

  # i18n configuration
    
# Language configuration (can be extended with additional languages)

[languages."en-us"]
  languageName = "English"
  weight = 2
  contentDir = "content/en-us"




[languages."pt-br"]
  languageName = "Português (Brasil)"
  weight = 1
  contentDir = "content/pt-br"

[outputs]
  home    = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  page    = ["HTML"]

[taxonomies]
  team     = "teams"
  doc_type = "doc_types"
  project  = "projects"
  tag      = "tags"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  style      = "dracula"
  lineNos    = false
  codeFences = true
  guessSyntax = true
